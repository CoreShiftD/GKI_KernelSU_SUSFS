name: 'Setup Build Environment'
description: 'Clones dependencies and exports mkbootimg/avbtool paths'
inputs:
  patches_commit:
    required: false
  anykernel_commit:
    required: false
  require_boot_sign_key:
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        # Setup ccache for both build.sh and Bazel
        sudo apt-get update && sudo apt-get install -y ccache
        export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
        export CC="ccache gcc"
        export CXX="ccache g++"
        echo "CCACHE_DIR=$GITHUB_WORKSPACE/.ccache" >> "$GITHUB_ENV"
        echo "CC='ccache gcc'" >> "$GITHUB_ENV"
        echo "CXX='ccache g++'" >> "$GITHUB_ENV"
        echo "$GITHUB_WORKSPACE/.ccache" > "$GITHUB_PATH"

        # For Bazel (kleaf), set up remote and disk cache if needed
        echo "BAZEL_CACHE_DIR=$GITHUB_WORKSPACE/.cache/bazel" >> "$GITHUB_ENV"
        mkdir -p "$GITHUB_WORKSPACE/.cache/bazel"

        mkdir -p "$GITHUB_WORKSPACE/kernel"
        mkdir -p "$GITHUB_WORKSPACE/git-repo"
        curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$GITHUB_WORKSPACE/git-repo/repo"
        chmod +x "$GITHUB_WORKSPACE/git-repo/repo"
        echo "$GITHUB_WORKSPACE/git-repo" >> "$GITHUB_PATH"

        if [ -n "${{ inputs.patches_commit }}" ]; then
          if [ -d "$GITHUB_WORKSPACE/kernel_patches" ]; then rm -rf "$GITHUB_WORKSPACE/kernel_patches"; fi
          git clone https://github.com/WildKernels/kernel_patches.git "$GITHUB_WORKSPACE/kernel_patches"
          cd "$GITHUB_WORKSPACE/kernel_patches"
          git checkout "${{ inputs.patches_commit }}"
          cd "$GITHUB_WORKSPACE"
        else
          git clone https://github.com/WildKernels/kernel_patches.git "$GITHUB_WORKSPACE/kernel_patches"
        fi

        if [ -n "${{ inputs.anykernel_commit }}" ]; then
          if [ -d "$GITHUB_WORKSPACE/AnyKernel3" ]; then rm -rf "$GITHUB_WORKSPACE/AnyKernel3"; fi
          git clone https://github.com/WildKernels/AnyKernel3.git "$GITHUB_WORKSPACE/AnyKernel3"
          cd "$GITHUB_WORKSPACE/AnyKernel3"
          git checkout "${{ inputs.anykernel_commit }}"
          cd "$GITHUB_WORKSPACE"
        elif [ ! -d "$GITHUB_WORKSPACE/AnyKernel3" ]; then
          git clone https://github.com/WildKernels/AnyKernel3.git -b gki-2.0 "$GITHUB_WORKSPACE/AnyKernel3"
        fi

        AOSP_MIRROR="https://android.googlesource.com"
        BRANCH="main-kernel-2025"
        BUILD_TOOLS_BRANCH="${BUILD_TOOLS_BRANCH:-$BRANCH}"
        MKBOOTIMG_BRANCH="${MKBOOTIMG_BRANCH:-main}"

        cd "$GITHUB_WORKSPACE"
        rm -rf kernel-build-tools mkbootimg

        echo "Cloning ${AOSP_MIRROR}/kernel/prebuilts/build-tools branch ${BUILD_TOOLS_BRANCH}"
        git clone "${AOSP_MIRROR}/kernel/prebuilts/build-tools" -b "$BUILD_TOOLS_BRANCH" --depth 1 kernel-build-tools

        echo "Cloning ${AOSP_MIRROR}/platform/system/tools/mkbootimg branch ${MKBOOTIMG_BRANCH}"
        git clone "${AOSP_MIRROR}/platform/system/tools/mkbootimg" -b "$MKBOOTIMG_BRANCH" --depth 1 mkbootimg

        echo "AVBTOOL=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/bin/avbtool" >> "$GITHUB_ENV"
        echo "MKBOOTIMG=$GITHUB_WORKSPACE/mkbootimg/mkbootimg.py" >> "$GITHUB_ENV"
        echo "UNPACK_BOOTIMG=$GITHUB_WORKSPACE/mkbootimg/unpack_bootimg.py" >> "$GITHUB_ENV"
        echo "BOOT_SIGN_KEY_PATH=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem" >> "$GITHUB_ENV"

        KEY_PATH="$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem"
        REQUIRE_BOOT_SIGN_KEY="${{ inputs.require_boot_sign_key }}"

        if [ -n "${BOOT_SIGN_KEY:-}" ]; then
          mkdir -p "$(dirname "$KEY_PATH")"
          printf '%s' "$BOOT_SIGN_KEY" > "$KEY_PATH"
          if ! head -n 1 "$KEY_PATH" | grep -q 'BEGIN'; then
            printf '%s' "$BOOT_SIGN_KEY" | base64 -d > "$KEY_PATH"
          fi
        elif [ "$REQUIRE_BOOT_SIGN_KEY" = "true" ]; then
          echo "::error title=Missing BOOT_SIGN_KEY::BOOT_SIGN_KEY secret is required for release boot image signing."
          exit 1
        elif [ ! -s "$KEY_PATH" ]; then
          echo "::error title=Missing boot signing key::BOOT_SIGN_KEY is unset and the AOSP test key was not found at $KEY_PATH."
          exit 1
        else
          echo "BOOT_SIGN_KEY is unset; using the AOSP test key from kernel-build-tools."
        fi
        chmod 600 "$KEY_PATH"
